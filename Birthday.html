
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow-x: hidden;
    text-align: center;
    color: white;
}

/* Title */
h1 {
    margin-top: 30px;
    font-size: 2.5em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px yellow; }
}

/* Slideshow Container */
.slideshow {
    width: 90%;
    max-width: 320px;
    aspect-ratio: 9 / 16;
    margin: 30px auto;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* Slides (background images) */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1s ease-in-out, transform 3s ease;
}

/* Active Slide */
.slide.active {
    opacity: 1;
    transform: scale(1.05);
}

/* Message */
#message {
    font-size: 1.3em;
    width: 85%;
    margin: auto;
    min-height: 120px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4d6d;
    color: white;
}

/* Floating Hearts */
.heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Happy Birthday AISHA ❤️</h1>

<div class="slideshow">
    <div class="slide active" style="background-image: url('IMG_20260118_170019_568.webp')"></div>
    <div class="slide" style="background-image: url('IMG-20260118-WA0047.jpg')"></div>
    <div class="slide" style="background-image: url('IMG_20260103_200835.jpg')"></div>
    <div class="slide" style="background-image: url('IMG_20260118_165942_468.webp')"></div>
</div>

<div id="message"></div>

<button onclick="surprise()">Click for Surprise 🎁</button>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const herName = "AISHA";
const yourName = "MIZAB";

const text = `Dear ${herName} ❤️,
You are the most beautiful part of my life 💕
Every moment with you is special ✨
I am so lucky to have you 💖
Happy Birthday, My Love 🎂

Forever yours,
${yourName} ❤️`;

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

/* Slideshow Logic */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);

/* Surprise */
function surprise() {
    alert(`${herName}, I LOVE YOU SO MUCH ❤️\nYou are my everything 💕`);
}

/* Floating Hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
