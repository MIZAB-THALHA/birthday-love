<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f001a, #330033, #ff4d6d);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Stars */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
    from {opacity: 0.2;}
    to {opacity: 1;}
}

/* Hearts */
.heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Countdown */
#countdownScreen {
    position: absolute;
    top: 40%;
    width: 100%;
}

#timer {
    font-size: 2em;
    color: #ffd6e0;
}

/* Main hidden */
#mainContent {
    display: none;
}

/* Title */
h1 {
    font-size: 2.5em;
    text-shadow: 0 0 20px #ff4d6d;
}

/* Slideshow */
.slideshow {
    width: 90%;
    max-width: 320px;
    aspect-ratio: 9/16;
    margin: 30px auto;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: 1s;
}

.slide.active {
    opacity: 1;
    transform: scale(1.05);
}

/* Gift box */
#giftBox {
    font-size: 60px;
    cursor: pointer;
    margin-top: 20px;
}

/* Message */
#message {
    margin-top: 20px;
    font-size: 1.2em;
    width: 85%;
    margin: auto;
}

/* Button */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: white;
    color: #ff4d6d;
}
</style>
</head>

<body>

<!-- COUNTDOWN -->
<div id="countdownScreen">
    <h1>💖 A Surprise is Coming 💖</h1>
    <h2 id="timer"></h2>
</div>

<!-- MAIN -->
<div id="mainContent">

<h1>Happy Birthday AISHA ❤️</h1>

<div class="slideshow">
    <div class="slide active" style="background-image:url('IMG_20260118_170019_568.webp')"></div>
    <div class="slide" style="background-image:url('IMG-20260118-WA0047.jpg')"></div>
    <div class="slide" style="background-image:url('IMG_20260103_200835.jpg')"></div>
    <div class="slide" style="background-image:url('IMG_20260118_165942_468.webp')"></div>
</div>

<div id="giftBox">🎁</div>

<div id="message"></div>

<button onclick="playMusic()">Play Music 🎵</button>

<audio id="bgMusic" loop>
<source src="Kesariya Brahmastra 128 Kbps.mp3" type="audio/mp3">
</audio>

</div>

<script>
// ⏳ 2 HOURS TEST
const targetTime = new Date("2026-03-30T15:21:00").getTime();
const timer = document.getElementById("timer");
const mainContent = document.getElementById("mainContent");
const countdownScreen = document.getElementById("countdownScreen");

function updateTimer(){
    let diff = targetTime - new Date().getTime();

    if(diff <= 0){
        countdownScreen.style.display="none";
        mainContent.style.display="block";
        startFireworks();
        return;
    }

    let h = Math.floor(diff/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));
    let s = Math.floor((diff%(1000*60))/1000);

    timer.innerHTML = h+"h "+m+"m "+s+"s left 💖";
}
setInterval(updateTimer,1000);
updateTimer();

// Typing
const text = `Dear AISHA ❤️,
You are my happiness 💕
My world 🌍
My everything 💖

Happy Birthday 🎂

Forever yours,
MIZAB ❤️`;

let i=0;
function typeWriter(){
    if(i<text.length){
        document.getElementById("message").innerHTML+=text[i];
        i++;
        setTimeout(typeWriter,40);
    }
}

// Gift click
document.getElementById("giftBox").onclick = function(){
    this.style.display="none";
    typeWriter();
};

// Slideshow
let slides=document.querySelectorAll(".slide");
let index=0;
setInterval(()=>{
    slides[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
},3000);

// Hearts
function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,300);

// Stars
for(let i=0;i<50;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    document.body.appendChild(star);
}

// Fireworks
function startFireworks(){
    for(let i=0;i<20;i++){
        let f=document.createElement("div");
        f.innerHTML="✨";
        f.style.position="fixed";
        f.style.left=Math.random()*100+"vw";
        f.style.top=Math.random()*100+"vh";
        f.style.fontSize="25px";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),2000);
    }
}

// Music
function playMusic(){
    document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
